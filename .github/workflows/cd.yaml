name: CD

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.0'
          cache: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: 21
      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4
      - run: ./gradlew :sdk:build :sdk-shared:build :sdk-coroutines:build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: build-reports
          path: '**/build/reports/**/*'

  release:
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: version
        name: Read SDK version
        run: echo "value=$(grep '^version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - id: tag_check
        name: Check if release tag already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          distribution: 'temurin'
          java-version: 21

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4
        if: steps.tag_check.outputs.exists == 'false'

      - name: Verify CHANGELOG entry
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew verifyChangelog

      - name: Verify README version
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew verifyReadmeVersion

      - name: Publish to Maven Central
        if: steps.tag_check.outputs.exists == 'false'
        run: >
          ./gradlew
          :sdk-shared:build :sdk:build :sdk-coroutines:build
          -x :sdk-shared:check -x :sdk:check -x :sdk-coroutines:check
          :sdk-shared:publish :sdk:publish :sdk-coroutines:publish
          :sdk-shared:jreleaserDeploy :sdk:jreleaserDeploy :sdk-coroutines:jreleaserDeploy
          --no-configuration-cache
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Extract release notes
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew getChangelog --no-header --no-summary -q > release_notes.md

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: steps.tag_check.outputs.exists == 'false'
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: release_notes.md
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(steps.version.outputs.value, 'RC') || contains(steps.version.outputs.value, 'alpha') || contains(steps.version.outputs.value, 'beta') }}
